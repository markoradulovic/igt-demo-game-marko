<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3f6b"/>
      <stop offset="50%" stop-color="#2c2545"/>
      <stop offset="100%" stop-color="#4a3f6b"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Outer frame -->
  <rect x="0" y="0" width="900" height="560" rx="24" fill="url(#frameGrad)" stroke="#6c5ce7" stroke-width="3"/>
  <!-- Inner border -->
  <rect x="8" y="8" width="884" height="544" rx="18" fill="none" stroke="#8b7fd4" stroke-width="1.5" opacity="0.5"/>
  <!-- Top accent line -->
  <rect x="30" y="4" width="840" height="2" rx="1" fill="#a29bfe" opacity="0.6"/>
  <!-- Bottom accent line -->
  <rect x="30" y="554" width="840" height="2" rx="1" fill="#a29bfe" opacity="0.6"/>
  <!-- Corner gems -->
  <circle cx="20" cy="20" r="6" fill="#ffd700" opacity="0.7"/>
  <circle cx="880" cy="20" r="6" fill="#ffd700" opacity="0.7"/>
  <circle cx="20" cy="540" r="6" fill="#ffd700" opacity="0.7"/>
  <circle cx="880" cy="540" r="6" fill="#ffd700" opacity="0.7"/>
  <!-- Inner glow overlay -->
  <rect x="16" y="16" width="868" height="528" rx="14" fill="url(#innerGlow)"/>
  <!-- Cutout for reel area (transparent center) -->
  <rect x="24" y="24" width="852" height="512" rx="12" fill="none"/>
</svg>
